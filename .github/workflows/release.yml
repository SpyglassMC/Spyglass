name: Release
on:
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  test-and-release:
    name: Test & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          # Caching for release workflow is explicitly configured via actions/cache with a separate
          # cache key from regular workflows. Disabling cache with setup-node.
          package-manager-cache: false

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-release-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-release-node-

      - run: npm ci

      - run: npm run build
        env:
          FETCH_BUNDLED_META_RESOURCES: true

      - run: npm test

      - run: npm run lint

      - run: npm run release
        env:
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          WORKFLOW_ACTOR: ${{ github.actor }}
          WORKFLOW_ACTOR_ID: ${{ github.actor_id }}
