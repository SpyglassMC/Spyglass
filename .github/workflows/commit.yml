name: Commit
on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"
permissions:
  contents: write
jobs:
  test-ubuntu:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run fmt:check

      - run: npm run build

      - run: npm test

      - run: tar -cvf build-artifact.tar packages/*/lib/ packages/*/out/ packages/*/dist/
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: build-artifact.tar

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run fmt:check

      - run: npm run build

      - run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - test-ubuntu
      - test-windows
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # - run: git pull origin gh-pages:gh-pages --ff-only
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "npm"
      - run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: build-artifact
      - run: |
          tar -xvf build-artifact.tar
          rm build-artifact.tar

      - run: npm run release:dry

      - name: Deploy playground
        if: ${{ github.event_name == 'push' }}
        working-directory: packages/playground
        run: npm run deploy
        env:
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          WORKFLOW_ACTOR: ${{ github.actor }}
          WORKFLOW_ACTOR_ID: ${{ github.actor_id }}
